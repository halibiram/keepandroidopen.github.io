social_callout_linkedin_4: "F-Droid odhaduje, že 85 % jeho open-source aplikací bude mít problémy s distribucí kvůli novým pravidlům Googlu pro ověřování vývojářů. Požadavek na úřední doklad totožnosti a podpisové klíče vytváří překážky pro anonymní přispěvatele, vývojáře v sankcionovaných zemích i projekty udržované dobrovolníky. {url} #KeepAndroidOpen"
social_callout_linkedin_5: "Navrhovaný postup od Googlu tzv. \"advanced flow\" pro instalaci neověřených aplikací (tzv. sideloading) vyžaduje 9 kroků, povinnou 24hodinovou čekací lhůtu a probíhá výhradně prostřednictvím Google Play Services. Komunita má přijmout jen příspěvek na blogu jako funkční záruku. V žádné beta verzi se to ještě neobjevilo. {url} #KeepAndroidOpen"
social_callout_linkedin_6: "V sázce je digitální suverenita. Plán Googlu zavést povinnou registraci všech vývojářů aplikací pro Android—i těch mimo Obchod Play—vytváří centrální bod kontroly a potenciální cenzury pro 3 miliardy zařízení. {url} #KeepAndroidOpen"
social_callout_linkedin_7: "Kampaň \"Keep Android Open\" získala podporu více než 67 organizací z celého světa. Odmítáme plán Googlu blokovat jakoukoli aplikaci, jejíž vývojář se centrálně nezaregistroval a neposkytl úřední doklad totožnosti. Přečtěte si otevřený dopis: {url} #KeepAndroidOpen"
social_callout_linkedin_8: "Dodatečná změna pravidel u hardwaru, který už lidé vlastní, je nebezpečný precedens. Povinné ověřování vývojářů ze strany Googlu ozbavuje uživatele jejich svobody volby a nutí je do řízeného ekosystému. {url} #KeepAndroidOpen"
social_callout_linkedin_9: "F-Droid a EFF bijí na poplach: ověřování vývojářů ze strany Googlu je \"existenční hrozbou\" pro alternativní distribuci aplikací. Musíme chránit open-source ekosystém, na kterém byl Android postaven. {url} #KeepAndroidOpen"
social_callout_linkedin_10: "Zatímco se Google snaží ještě více upevnit své postavení gatekeepra, komunita se brání. Vaše zařízení by mělo být vaším majetkem, ne pronajatým terminálem s dodatečnými omezeními. Přidejte se k hnutí: {url} #KeepAndroidOpen"

social_callout_bluesky_1: "Od září 2026 Google zablokuje každou aplikaci pro Android, jejíž vývojář se nezaregistroval a neposkytl úřední doklad totožnosti. Týká se to všech aplikací, nejen z Obchodu Play. F-Droid to nazývá \"existenční hrozbou\". @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_2: "Google vyžaduje, aby se všichni vývojáři aplikací pro Android centrálně registrovali, zaplatili poplatek a předložili úřední doklad totožnosti. Aplikace neregistrovaných vývojářů budou tiše zablokovány. Více než 67 organizací je proti. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_3: "Po 17 letech propagace Androidu jako otevřené platformy Google zavádí povinnou registraci všech vývojářů. Nezávislí vývojáři, open-source přispěvatelé i alternativní obchody jako F-Droid mají nejistou budoucnost. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_4: "Navrhovaný postup od Googlu pro instalaci neověřených aplikací: 9 kroků, 24hodinové čekání, realizace prostřednictvím služby Play Services (kterou může Google kdykoli bez souhlasu změnit). Existuje jen jako příspěvek na blogu. @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_5: "EFF varuje, že ověřování vývojářů ze strany Googlu vytváří \"cestu k cenzuře\". Nejvíce postiženi budou vývojáři v represivních zemích, anonymní open-source přispěvatelé a tvůrci nástrojů na ochranu soukromí. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_6: "Plán Googlu blokovat neověřené aplikace je tzv. \"rug pull\", neboli podraz na 3 miliardy lidí, kteří si Android vybrali kvůli jeho otevřenosti. Nenechte je proměnit váš telefon v uzavřený ekosystém. @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_7: "Vlastnictví znamená kontrolu. Pokud Google může zablokovat jakoukoli aplikaci na vašem telefonu, telefon ve skutečnosti nevlastníte. Přidejte se k více než 100 000 lidí, kteří bojují za zachování otevřeného systému Android. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_8: "Povinná registrace s dokladem totožnosti pro každého vývojáře aplikací? To je splněný sen cenzury a noční můra pro soukromí. Chraňme otevřený web a otevřené mobilní zařízení. . @keepandroidopen.bsky.social {url}"
social_callout_bluesky_9: "Pro sideloading (instalace aplikací mimo oficiální obchod) by neměla být vyžadována 24hodinová čekací lhůta a 9kroková překážková dráha. Googleův \"advanced flow\" je navržen tak, aby skončil neúspěchem. Pomozte nám udržet Android otevřený! @keepandroidopen.bsky.social {url}"
social_callout_bluesky_10: "Od F-Droidu přes nezávislé vývojáře, celý ekosystém Androidu je ohrožen novým nařízením Googlu o povinné registraci. Podívejte se, proč více než 67 organizací říká ne: {url}"

social_callout_mastodon_1: "Od září 2026 bude Google vyžadovat, aby se každý vývojář aplikací pro Android centrálně zaregistroval, předložil úřední doklad totožnosti a poskytl podpisové klíče. Aplikace neregistrovaných vývojářů budou zablokovány na všech certifikovaných zařízeních po celém světě. To ohrožuje F-Droid, open-source distribuci i uživatelskou svobodu. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_2: "Program ověřování vývojářů Androidu ze strany Googlu vyžaduje úřední doklad totožnosti, podpisové klíče a poplatek od každého vývojáře, který chce, aby jeho software bylo možné nainstalovat na Android. EFF označuje bránění aplikací za \"cestu k cenzuře\". Více než 67 organizací podepsalo otevřený dopis proti tomu. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_3: "F-Droid, domov tisíců svobodných a open-source aplikací pro Android, označuje ověřování vývojářů ze strany Googlu za \"existenční hrozbu\". Odhaduje se, že 85 % aplikací F-Droidu bude mít problémy s distribucí, protože jejich vývojáři prošli F-Droidem, nikoli Googlem. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_4: "Navrhovaný postup od Googlu pro instalaci neověřených aplikací (tzv. sideloading) vyžaduje 9 kroků, povinnou 24hodinovou čekací lhůtu a běží přes Google Play Services, nikoli přes operační systém Android. Google ho může kdykoli změnit nebo odstranit bez souhlasu uživatele. Ještě se neobjevil v žádné beta verzi. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_5: "Povinná registrace vývojářů, kterou Google zavádí na Androidu, vyvolává obavy u vývojářů v sankcionovaných zemích, anonymních open-source přispěvatelů a tvůrců nástrojů na ochranu soukromí nebo zabezpečení. Google opakovaně prokázal, že vyhovuje vládním požadavkům na odstranění aplikací. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_6: "Síla Androidu spočívala v jeho decentralizovanosti. Plán Googlu zavést centrální registraci pro každého vývojáře aplikací toto ničí. Musíme se této centralizaci moci postavit. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_7: "Když jste si koupili hardware, měli byste mít poslední slovo ohledně softwaru. Plán Googlu blokovat neověřené aplikace je přímý útok na uživatelskou suverenitu. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
social_callout_mastodon_8: "Představte si svět, kde se každý malý nadšenec nebo dobrovolný vývojář musí registrovat u globální korporace, jen aby mohl sdílet svou práci. To je svět, který Google v roce 2026 buduje pro Android. {url} @keepandroidopen@techhub.social"
social_callout_mastodon_9: "Googleův \"advanced flow\" pro sideloading (instalace aplikací mimo oficiální obchod) je odstrašující mechanismus, nikoli východisko. 9 kroků a 24 hodin čekání na software, který vlastníte? Ne, díky. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_10: "Více než 100 000 lidí a přes 67 organizací se postavilo proti pokusu Googlu uzamknout Android. Přidejte se k boji za skutečně otevřený mobilní ekosystém. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"

social_callout_facebook_1: "Od září 2026 bude Google vyžadovat, aby se každý vývojář aplikací pro Android centrálně zaregistroval a poskytl úřední doklad totožnosti. Aplikace neregistrovaných vývojářů budou zablokovány na všech certifikovaných zařízeních Android po celém světě. Týká se to všech aplikací, nejen těch z Obchodu Play. Více zde: {url}"
social_callout_facebook_2: "F-Droid, open-source obchod s aplikacemi pro Android používaný miliony lidí, označuje ověřování vývojářů Googlu za \"existenční hrozbu\" pro své další fungování. Více než 67 organizací, včetně EFF, FSF a Tor Project, podepsalo otevřený dopis proti této politice. Zjistěte, proč je to důležité: {url}"
social_callout_facebook_3: "Navrhovaný postup od Googlu pro instalaci neověřených aplikací pro uzamčený Android bude vyžadovat 9 kroků, povinnou 24hodinovou čekací lhůtu a bude probíhat přes Google Play Services (které může Google kdykoli změnit). Komunita má přijmout jen příspěvek na blogu jako záruku. {url}"
social_callout_facebook_4: "Otevřenost je již 17 let hlavní charakteristikou Androidu. Právě z tohoto důvodu si jej miliony lidí vybraly namísto iPhonu. Google nyní zavádí povinnou registraci všech vývojářů aplikací, včetně těch distribuovaných mimo Obchod Play. Nejvíce postiženi budou nezávislí vývojáři a open-source projekty. {url}"
social_callout_facebook_5: "EFF označuje bránění aplikací za \"cestu k cenzuře\". Ověřování vývojářů ze strany Googlu by jedné společnosti dalo možnost blokovat jakoukoli aplikaci od jakéhokoli vývojáře na jakémkoli certifikovaném zařízení po celém světě. To vytváří precedens, který přesahuje Android a zasahuje do budoucnosti osobních počítačů. {url}"
social_callout_facebook_6: "Váš telefon, vaše volba? Ne, pokud si Google prosadí své. Od roku 2026 plánují zablokovat jakoukoli aplikaci, jejíž vývojář se nezaregistroval a neposkytl úřední doklad totožnosti. To se týká úplně všech. {url}"
social_callout_facebook_7: "Google dodatečně uzamyká miliardy zařízení, která byla prodána jako otevřené platformy. Tento tzv. \"rug pull\", neboli podraz, ohrožuje nezávislé vývojáře a alternativní obchody jako F-Droid. {url}"
social_callout_facebook_8: "Je váš telefon skutečně váš? Pokud Google rozhoduje, které aplikace smíte nainstalovat, odpověď zní ne. Přidejte se k více než 100 000 lidí, kteří bojují bojují za to, aby Android zůstal otevřený. {url}"
social_callout_facebook_9: "Devítikrokový proces Googlu pro \"povolení\" neověřených aplikací je past. Je navržen tak, aby byl tak obtížný, že ho nikdo nepoužije, a Google tak získá úplnou kontrolu. {url}"
social_callout_facebook_10: "Od studentů, kteří tvoří své první aplikace, až po dobrovolníky vytvářející nástroje na ochranu soukromí - povinná registrace Googlu zastaví inovace. Pomozte nám udržet Android otevřený! {url}"

