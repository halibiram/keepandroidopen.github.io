# Meta

# Hero
hero_lede: "Váš telefon brzy přestane být váš."
hero_countdown_label: "dní do uzamčení"
hero_sub: >-
  Od září 2026 Google bez vašeho souhlasu prosadí tichou aktualizaci, která **zablokuje každou aplikaci pro Android**, jejíž vývojář se nezaregistroval u Googlu, nepodepsal smlouvu, nezaplatil a nepředložil úřední doklad totožnosti.
hero_kicker: "Každá aplikace a každé zařízení na celém světě, bez možnosti odmítnutí."

# What Google is doing
what_heading: "Co Google dělá"
what_intro: >-
  V srpnu 2025 Google [oznámil](https://developer.android.com/developer-verification) novou povinnost: od září 2026 **se musí každý vývojář Android aplikací zaregistrovat centrálně u Googlu**, než bude možné jeho software nainstalovat na jakékoli zařízení. Nejen aplikace z Obchodu Play: všechny aplikace. To zahrnuje aplikace sdílené mezi přáteli, distribuované přes [F-Droid](https://f-droid.org), vytvářené nadšenci pro osobní potřebu. Nezávislí vývojáři, církevní a komunitní skupiny i nadšenci tak budou zbaveni možnosti vyvíjet a distribuovat svůj software.
what_registration: "Registrace vyžaduje:"
what_req_fee: "Zaplacení poplatku Googlu"
what_req_terms: "Souhlas s Podmínkami použití Googlu"
what_req_id: "Předložení úředního dokladu totožnosti"
what_req_signing: "Poskytnutí důkazu o vašem soukromém podpisovém klíči"
what_req_appids: "Uvedení všech současných a všech budoucích identifikátorů aplikací"
what_pullquote: "Pokud vývojář nesplní podmínky, jeho aplikace budou tiše zablokovány na všech zařízeních Android na celém světě."

# Who this hurts
impact_heading: "Koho to poškodí"
impact_you_heading: "Vás"
impact_you_p1: "Koupili jste si telefon s Androidem, protože Google vám slíbil, že je otevřený. Mohli jste si nainstalovat, co jste chtěli, a o tom to celé bylo."
impact_you_p2: >-
  Google nyní dodatečně mění podmínky této dohody i u hardwaru, který již vlastníte. Po nasazení této aktualizace budete moci používat pouze software, který Google předem schválil. A to na vašem telefonu: *vašem* zařízení, za které jste *vy* zaplatili.
impact_dev_heading: "Nezávislí vývojáři"
impact_dev_p1: "První aplikace teenagera, nástroj na ochranu soukromí od dobrovolníka, nebo interní beta verze firmy. Na tom nezáleží. Od září 2026 nebude možné nic z toho nainstalovat bez souhlasu Googlu."
impact_dev_p2: >-
  [F-Droid](https://f-droid.org), domov tisíců svobodných a open-source aplikací pro Android, to označil za ["existenční" hrozbu](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html). Cory Doctorow to nazývá ["Darth Android"](https://pluralistic.net/2025/09/01/fulu/).
impact_gov_heading: "Vlády a občanská společnost"
impact_gov_p1: >-
  Google [opakovaně prokázal](https://www.aclu.org/news/free-speech/app-store-oligopoly), že vyhovuje požadavkům autoritářských režimů na odstranění aplikací. Díky tomuto programu bude software, na kterém běží instituce vaší země, záviset na libovůli jediné zahraniční korporace, která se nikomu nezodpovídá.
impact_gov_p2: >-
  [EFF označuje](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) bránění aplikací za "stále se rozšiřující cestu k cenzuře internetu."

# Advanced flow
flow_heading: "\"Úniková cesta\" Googlu je past"
flow_intro: >-
  Google tvrdí, že "pokročilí uživatelé" budou moci ["stále instalovat"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) neověřené aplikace. Takhle to *ve skutečnosti* vypadá:
flow_step1: "Prohrabejte se Nastavením systému, najděte Možnosti pro vývojáře"
flow_step2: "Klepněte na číslo sestavení **sedmkrát** pro aktivaci  vývojářského režimu"
flow_step3: "Odmítněte varovné obrazovky o nátlaku"
flow_step4: "Zadejte svůj PIN"
flow_step5: "Restartujte zařízení"
flow_step6: "**Počkejte 24 hodin**"
flow_step7: "Vraťte se, odmítněte další varovné obrazovky"
flow_step8: "Vyberte \"povolit dočasně\" (7 dní) nebo \"povolit trvale\""
flow_step9: "Znovu potvrďte, že chápete \"rizika\""
flow_summary: "Devět kroků. Povinná 24hodinová ochranná lhůta. *Pro instalaci softwaru na zařízení, které vlastníte.*"
flow_detail: >-
  Ještě horší: celý tento postup probíhá výhradně přes **Google Play Services**, nikoli přes operační systém Android. Google ho může kdykoli změnit, zpřísnit nebo zrušit bez aktualizace OS a bez vašeho souhlasu. A k dnešnímu dni se ještě neobjevil v žádné beta, preview ani canary verzi.  Existuje pouze jako příspěvek na blogu a v pár návrzích.

# Precedent
precedent_heading: "Tohle je větší než Android"
precedent_pullquote: "Pokud Google dokáže dodatečně uzamknout miliardy zařízení, která byla prodána jako otevřené platformy, sleduje to každý výrobce hardwaru na planetě."
precedent_p1: >-
  Zavádí se princip: **společnost, která vyrobila vaše zařízení, má po jeho zakoupení právo rozhodovat, jaký software na něm smíte spouštět.** V softwaru se tomu říká "rug pull", neboli podraz; ale alespoň jste vždy měli možnost nainstalovat si konkurenční software. V případě hardwaru se však jedná o hotovou věc (*fait accompli*), která vás zbavuje možnosti volby a činí vás bezmocnými vůči rozmarům jediného, nikomu se nezodpovídajícího gatekeepera a usvědčeného monopolisty.
precedent_p2: >-
  Otevřenost Androidu nikdy nebyla pouhou funkcí. Byl to *slib*, který ho odlišoval od iPhonu. Právě z tohoto důvodu si Android vybraly miliony lidí. Google nyní tento slib jednostranně ruší na zařízeních, která už lidé *mají* v kapse, protože se rozhodl, že má dostatečnou tržní dominanci a regulační vliv, aby mu to prošlo.
precedent_arstechnica: >-
  [Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *"Závist Googlu vůči Applu hrozí rozbitím tradice otevřeného Androidu."*

# Objections
objections_heading: "Ale počkat, není tohle..."
obj_security_q: "\"...jen o bezpečnosti?\""
obj_security_a: >-
  Bezpečnostní zdůvodnění je kouřová clona. Google Play Protect už malware skenuje nezávisle na identitě vývojáře. Požadavek na úřední doklad totožnosti kód bezpečnější nedělá. Dělá z vývojářů *identifikovatelné a ovladatelné* osoby. Autoři malwaru se mohou registrovat. Nezávislí vývojáři a disidenti často nemohou. [EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) to říká naplno: bránění na základě identity je nástroj cenzury, nikoli bezpečnosti.
obj_sideloading_q: "\"...stále sideloading, když použiju Advanced flow?\""
obj_sideloading_a: >-
  Devět kroků, 24hodinové čekání, schované v Možnostech pro vývojáře, řízené proprietární službou, kterou Google může kdykoli zrušit. To není sideloading  (instalace aplikací mimo oficiální obchod). To je **odstrašující mechanismus** navržený tak, aby ho téměř nikdo nedokončil. A protože to probíhá přes Play Services a ne přímo v operačním systému, může Google tuto funkci bez varování omezit nebo zrušit.
obj_hide_q: "\"...problém jen pro ty, kteří mají co skrývat?\""
obj_hide_a: >-
  Prvními oběťmi budou whistlebloweři, novináři a aktivisté v autoritářských režimech. Další na řadě jsou oběti domácího násilí. Všechny tyto skupiny mají legitimní důvody distribuovat nebo používat software, aniž by musely svou úřední identitu ukládat do databáze Googlu. Anonymní přispívání do open-source projektů je tradice starší než Google sám. Toto opatření ji na Androidu ukončuje.
obj_apple_q: "\"...to stejné, co dělá Apple?\""
obj_apple_a: >-
  Apple byl od samého počátku uzavřeným ekosystémem. Lidé si Android vybrali *právě proto, že byl jiný*. Tvrdit, že "Apple to dělá taky", je jen snaha o zhoršení situace a slabý argument typu *tu quoque* ("ty taky"). A pod regulačním tlakem (nařízení EU o digitálních trzích, DMA) je i Apple nucen se otevřít. Google jde opačným směrem: snaží se své postavení gatekeepera ještě více upevnit.
obj_cost_q: "\"...jen 25 dolarů a nějaké papírování?\""
obj_cost_a: >-
  Možná, pokud jste vývojář v USA s platební kartou a řidičským průkazem. Zkuste být student v subsaharské Africe, disident v Myanmaru nebo dobrovolník spravující komunitní zdravotnickou aplikaci. Náklady nejsou jen finanční: musíte předložit úřední doklad totožnosti a důkaz o podpisových klíčích společnosti, která [pravidelně vyhovuje](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) vládním požadavkům na odstranění aplikací a odhalení vývojářů.

# Fight back
act_heading: "Braňte se"
act_everyone_heading: "Všichni"
act_fdroid: >-
  **[Nainstalujte si F-Droid](https://f-droid.org)** na každé zařízení Android, které vlastníte. Alternativní obchody přežijí jen tehdy, když je lidé skutečně používají.
act_regulators: >-
  **[Kontaktujte své regulátory.](/cs/cta/#consumers)** Regulátoři po celém světě se skutečně obávají monopolů a centralizace moci v technologickém sektoru a chtějí slyšet přímo od jednotlivců, kterých se to týká.
act_share: >-
  **Sdílejte tuto stránku.** Vložte odkaz na [keepandroidopen.org](https://keepandroidopen.org) všude kam můžete.
act_astroturf: >-
  **Postavte se proti falešným aktivistům.** Skupina lidí, kteří pořád říkají "no, vlastně...", je v plné síle. Nenechte je, aby určovali, jak se o tom bude mluvit.
act_petition: >-
  **[Podepište petici na change.org](https://www.change.org/p/stop-google-from-limiting-apk-file-usage/)** a přidejte se k více než 100 000 signatářům, kteří už dali najevo svůj názor.
act_letter: >-
  **[Přečtěte si a sdílejte náš otevřený dopis](/open-letter)**
act_survey: >-
  **Řekněte Googlu, co si o tom myslíte** prostřednictvím jejich vlastního [průzkumu k ověřování vývojářů](https://docs.google.com/forms/d/e/1FAIpQLSfN3UQeNspQsZCO2ITkdzMxv81rJDEGGjO-UIDDY28Rz_GEVA/viewform?pli=1) <small>(i když to asi nic nezmění)</small>.
act_dev_heading: "Vývojáři"
act_dev_intro: >-
  <strong style="text-transform: uppercase;">Neregistrujte se.</strong> Nepřipojujte se k programu tím, že se byste se zaregistrovali do Android Developer Console a souhlasili s jejich neodvolatelnými Podmínkami použití. Neověřujte svou totožnost.  *Nehrajte jejich hru.*
act_dev_resist: "Plán Googlu bude fungovat jen, když budou vývojáři spolupracovat. Nespolupracujte."
act_dev_talk: "Přemluvte ostatní vývojáře a organizace, aby se neregistrovali."
act_dev_warn: >-
  Přidejte do svých aplikací [knihovnu FreeDroidWarn](https://github.com/woheller69/FreeDroidWarn), aby varovala uživatele.
act_dev_banner: >-
  Spravujete web? [Přidejte banner s odpočítáváním.](/banner)
act_google_heading: "Zaměstnanci Googlu"
act_google_text: >-
  Pokud víte něco o technické implementaci programu nebo interních důvodech, kontaktujte [tips@keepandroidopen.org](mailto:tips@keepandroidopen.org) z počítače, který *není pracovní* a z účtu *jiného než Gmail*. Zaručujeme naprostou diskrétnost.

